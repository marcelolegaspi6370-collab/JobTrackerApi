<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>JobTracker <span class="accent">Pro</span></h1>
            <p>Manage your applications efficiently.</p>
        </header>

        <main>
            <section class="add-job-section">
                <h2>Add New Application</h2>
                <form id="addJobForm">
                    <div class="form-grid">
                        <input type="text" id="companyName" placeholder="Company Name" required>
                        <input type="text" id="positionTitle" placeholder="Position Title" required>
                        <input type="text" id="location" placeholder="Location">
                        <input type="url" id="jobUrl" placeholder="Job URL (https://...)">
                        <input type="text" id="salaryRange" placeholder="Salary Range">
                        <select id="status">
                            <option value="Applied">Applied</option>
                            <option value="Interviewing">Interviewing</option>
                            <option value="Offer">Offer</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add Job</button>
                </form>
            </section>

            <section class="jobs-list-section">
                <h2>Your Applications</h2>
                <div class="table-container">
                    <table id="jobsTable">
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Position</th>
                                <th>Status</th>
                                <th>Date Applied</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody">
                            <!-- Jobs will be injected here via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
